---
AWSTemplateFormatVersion: '2010-09-09'

Description: 'CloudFront to route to S3 bucket. Supports optional custom domain to avoid network blocks.'

Parameters:
    AppDomainName:
        Type: String
        Default: ''
        Description: 'Custom domain for the app, e.g. app.biteroll.com. Leave empty to use the CloudFront URL.'
    AcmCertArn:
        Type: String
        Default: ''
        Description: 'ACM certificate ARN in us-east-1 covering AppDomainName. Required when AppDomainName is set.'

Conditions:
    HasCustomDomain: !Not [!Equals [!Ref AppDomainName, '']]

Resources:
    BiteRollCloudFront:
        Type: 'AWS::CloudFront::Distribution'
        Properties:
            DistributionConfig:
                Comment: "BiteRoll"
                Aliases: !If
                  - HasCustomDomain
                  - [!Ref AppDomainName]
                  - !Ref AWS::NoValue
                ViewerCertificate: !If
                  - HasCustomDomain
                  - AcmCertificateArn: !Ref AcmCertArn
                    SslSupportMethod: sni-only
                    MinimumProtocolVersion: TLSv1.2_2021
                  - CloudFrontDefaultCertificate: true
                DefaultCacheBehavior:
                    ViewerProtocolPolicy: 'redirect-to-https'
                    TargetOriginId: 'BiteRollS3Origin'
                    CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad  #CachingDisabled
                CacheBehaviors:
                    - CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  #CachingOptimized
                      ViewerProtocolPolicy: 'redirect-to-https'
                      TargetOriginId: 'BiteRollS3Origin'
                      PathPattern: /assets/*
                    - CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
                      ViewerProtocolPolicy: 'redirect-to-https'
                      TargetOriginId: 'BiteRollMediaS3Origin'
                      PathPattern: /media/*
                CustomErrorResponses:
                  - ErrorCode: 403
                    ResponseCode: 200
                    ResponsePagePath: /index.html
                  - ErrorCode: 404
                    ResponseCode: 200
                    ResponsePagePath: /index.html
                Enabled: true
                Origins:
                    - Id: 'BiteRollS3Origin'
                      DomainName: !ImportValue DomainName
                      OriginAccessControlId: !GetAtt BiteRollCloudFrontOAC.Id
                      S3OriginConfig:
                          OriginAccessIdentity: ''
                    - Id: 'BiteRollMediaS3Origin'
                      DomainName: !ImportValue MediaDomainName
                      OriginAccessControlId: !GetAtt BiteRollCloudFrontOAC.Id
                      S3OriginConfig:
                          OriginAccessIdentity: ''
                DefaultRootObject: 'index.html'
            Tags:
                - Key: Project
                  Value: BiteRoll

    BiteRollCloudFrontOAC:
        Type: 'AWS::CloudFront::OriginAccessControl'
        Properties:
            OriginAccessControlConfig:
                Name: 'BiteRollCloudFrontOAC'
                OriginAccessControlOriginType: s3
                SigningBehavior: always
                SigningProtocol: sigv4

Outputs:
    CloudFrontDistributionId:
        Description: 'CloudFront distribution ID'
        Value: !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${BiteRollCloudFront}'
        Export:
            Name: CloudFrontDistributionId
    CloudFrontDomainName:
        Description: 'CloudFront domain name (use this for Route 53 alias)'
        Value: !GetAtt BiteRollCloudFront.DomainName
        Export:
            Name: CloudFrontDomainName





