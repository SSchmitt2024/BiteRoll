---
AWSTemplateFormatVersion: '2010-09-09'

Description: 'Permissions for the GitHub Actions user that deploys the BiteRoll CI/CD pipeline'

Parameters:
    GitHubActionsUserName:
        Type: String
        Default: biteroll-github-actions
        Description: IAM user used by GitHub Actions repository secrets

Resources:
    GitHubActionsDeployPolicy:
        Type: 'AWS::IAM::Policy'
        Properties:
            PolicyName: BiteRollGitHubActionsDeploy
            Users:
                - !Ref GitHubActionsUserName
            PolicyDocument:
                Version: '2012-10-17'
                Statement:
                    - Sid: ManageCloudFormationStacks
                      Effect: Allow
                      Action:
                          - cloudformation:CreateChangeSet
                          - cloudformation:CreateStack
                          - cloudformation:DeleteChangeSet
                          - cloudformation:DescribeChangeSet
                          - cloudformation:DescribeStackEvents
                          - cloudformation:DescribeStackResources
                          - cloudformation:DescribeStacks
                          - cloudformation:ExecuteChangeSet
                          - cloudformation:GetTemplateSummary
                          - cloudformation:ListExports
                          - cloudformation:UpdateStack
                          - cloudformation:ValidateTemplate
                      Resource: '*'
                    - Sid: ManageBiteRollS3Buckets
                      Effect: Allow
                      Action:
                          - s3:CreateBucket
                          - s3:DeleteBucketPolicy
                          - s3:GetBucketLocation
                          - s3:GetBucketPolicy
                          - s3:GetBucketVersioning
                          - s3:GetEncryptionConfiguration
                          - s3:GetLifecycleConfiguration
                          - s3:GetBucketOwnershipControls
                          - s3:GetReplicationConfiguration
                          - s3:ListBucket
                          - s3:PutBucketCORS
                          - s3:PutBucketOwnershipControls
                          - s3:PutBucketPolicy
                          - s3:PutBucketPublicAccessBlock
                          - s3:PutBucketReplication
                          - s3:PutBucketTagging
                          - s3:PutBucketVersioning
                          - s3:PutEncryptionConfiguration
                          - s3:PutLifecycleConfiguration
                      Resource:
                          - 'arn:aws:s3:::biteroll-*'
                    - Sid: ManageBiteRollS3Objects
                      Effect: Allow
                      Action:
                          - s3:DeleteObject
                          - s3:GetObject
                          - s3:GetObjectVersion
                          - s3:PutObject
                          - s3:PutObjectTagging
                      Resource:
                          - 'arn:aws:s3:::biteroll-*/*'
                    - Sid: ManageBiteRollComputeAndApi
                      Effect: Allow
                      Action:
                          - apigateway:*
                          - cognito-idp:*
                          - dynamodb:*
                          - lambda:*
                      Resource: '*'
                    - Sid: ManageBiteRollCloudFront
                      Effect: Allow
                      Action:
                          - cloudfront:*
                      Resource: '*'
                    - Sid: ManageBiteRollObservability
                      Effect: Allow
                      Action:
                          - budgets:*
                          - cloudtrail:*
                          - cloudwatch:*
                          - logs:*
                          - resourcegroupstaggingapi:GetResources
                          - sns:*
                      Resource: '*'
                    - Sid: ManageBiteRollIamRoles
                      Effect: Allow
                      Action:
                          - iam:AttachRolePolicy
                          - iam:CreatePolicy
                          - iam:CreateRole
                          - iam:DeleteRole
                          - iam:DeleteRolePolicy
                          - iam:DetachRolePolicy
                          - iam:GetPolicy
                          - iam:GetPolicyVersion
                          - iam:GetRole
                          - iam:GetRolePolicy
                          - iam:ListAttachedRolePolicies
                          - iam:ListPolicyVersions
                          - iam:ListRolePolicies
                          - iam:PassRole
                          - iam:PutRolePolicy
                          - iam:TagRole
                          - iam:UpdateAssumeRolePolicy
                      Resource:
                          - 'arn:aws:iam::*:role/biteroll-*'
                          - 'arn:aws:iam::*:policy/biteroll-*'
                    - Sid: UpdateThisGitHubActionsPolicy
                      Effect: Allow
                      Action:
                          - iam:DeleteUserPolicy
                          - iam:GetUser
                          - iam:GetUserPolicy
                          - iam:ListUserPolicies
                          - iam:PutUserPolicy
                      Resource: !Sub 'arn:aws:iam::${AWS::AccountId}:user/${GitHubActionsUserName}'
                    - Sid: ReadCallerIdentity
                      Effect: Allow
                      Action:
                          - sts:GetCallerIdentity
                      Resource: '*'
