---
AWSTemplateFormatVersion: '2010-09-09'

Description: 'Rest API Gateway to handle traffic to lambda backend. Supports optional regional custom domain for latency routing.'

Parameters:
    ApiDomainName:
        Type: String
        Default: ''
        Description: 'Custom domain for the API, e.g. api.biteroll.com. Leave empty to skip.'
    RegionalCertArn:
        Type: String
        Default: ''
        Description: 'ACM certificate ARN in THIS region covering ApiDomainName. Required when ApiDomainName is set.'

Conditions:
    HasCustomDomain: !Not [!Equals [!Ref ApiDomainName, '']]

Resources:
    API:
        Type: AWS::ApiGateway::RestApi
        Properties:
            Name: 'RestAPI'

    # /feed
    FeedResource:
        Type: AWS::ApiGateway::Resource
        Properties:
            RestApiId: !Ref API
            ParentId: !GetAtt API.RootResourceId
            PathPart: feed
    FeedMethod:
        Type: AWS::ApiGateway::Method
        Properties:
            RestApiId: !Ref API
            ResourceId: !Ref FeedResource
            HttpMethod: GET
            AuthorizationType: NONE
            Integration:
                Type: AWS_PROXY
                IntegrationHttpMethod: POST
                Uri: !Sub
                  - 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${lambdaArn}/invocations'
                  - lambdaArn: !ImportValue LambdaFunctionARN

    # /menu
    MenuResource:
        Type: AWS::ApiGateway::Resource
        Properties:
            RestApiId: !Ref API
            ParentId: !GetAtt API.RootResourceId
            PathPart: menu
    MenuMethod:
        Type: AWS::ApiGateway::Method
        Properties:
            RestApiId: !Ref API
            ResourceId: !Ref MenuResource
            HttpMethod: GET
            AuthorizationType: NONE
            Integration:
                Type: AWS_PROXY
                IntegrationHttpMethod: POST
                Uri: !Sub
                  - 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${lambdaArn}/invocations'
                  - lambdaArn: !ImportValue LambdaFunctionARN

    # /like
    LikeResource:
        Type: AWS::ApiGateway::Resource
        Properties:
            RestApiId: !Ref API
            ParentId: !GetAtt API.RootResourceId
            PathPart: like
    LikeMethod:
        Type: AWS::ApiGateway::Method
        Properties:
            RestApiId: !Ref API
            ResourceId: !Ref LikeResource
            HttpMethod: POST
            AuthorizationType: NONE
            Integration:
                Type: AWS_PROXY
                IntegrationHttpMethod: POST
                Uri: !Sub
                  - 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${lambdaArn}/invocations'
                  - lambdaArn: !ImportValue LambdaFunctionARN

    Deployment:
        Type: AWS::ApiGateway::Deployment
        Properties:
            RestApiId: !Ref API
        DependsOn:
          - FeedMethod
          - MenuMethod
          - LikeMethod
    Stage:
        Type: AWS::ApiGateway::Stage
        Properties:
            RestApiId: !Ref API
            DeploymentId: !Ref Deployment
            StageName: prod
    LambdaPermission:
        Type: AWS::Lambda::Permission
        Properties:
            FunctionName: !ImportValue LambdaFunctionARN
            Action: lambda:InvokeFunction
            Principal: apigateway.amazonaws.com
            SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${API}/*'

    # Custom domain for Route 53 latency routing — only created when ApiDomainName is provided
    RegionalDomainName:
        Type: AWS::ApiGateway::DomainName
        Condition: HasCustomDomain
        Properties:
            DomainName: !Ref ApiDomainName
            RegionalCertificateArn: !Ref RegionalCertArn
            EndpointConfiguration:
                Types:
                  - REGIONAL

    BasePathMapping:
        Type: AWS::ApiGateway::BasePathMapping
        Condition: HasCustomDomain
        DependsOn: Stage
        Properties:
            DomainName: !Ref RegionalDomainName
            RestApiId: !Ref API
            Stage: prod

Outputs:
    ApiRegionalDomainName:
        Condition: HasCustomDomain
        Description: 'Regional domain name — use this as the Route 53 alias target'
        Value: !GetAtt RegionalDomainName.RegionalDomainName
        Export:
            Name: !Sub 'ApiRegionalDomainName-${AWS::Region}'
    ApiRegionalHostedZoneId:
        Condition: HasCustomDomain
        Description: 'Hosted zone ID for the regional API Gateway endpoint'
        Value: !GetAtt RegionalDomainName.RegionalHostedZoneId
        Export:
            Name: !Sub 'ApiRegionalHostedZoneId-${AWS::Region}'