---
AWSTemplateFormatVersion: '2010-09-09'

Description: 'BiteRoll SNS topic for operational alerts'

Parameters:
    AlertEmail:
        Type: String
        Description: Email address for alarm notifications

Resources:
    BiteRollSNSTopic:
        Type: AWS::SNS::Topic
        Properties:
            TopicName: biteroll-alarms
            Subscription:
                - Protocol: email
                  Endpoint: !Ref AlertEmail
            Tags:
                - Key: Project
                  Value: BiteRoll

Outputs:
    AlarmTopicArn:
        Description: SNS Topic ARN for alarms
        Value: !Ref BiteRollSNSTopic
        Export:
            Name: BiteRoll-AlarmTopicArn
