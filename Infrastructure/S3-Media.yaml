---
AWSTemplateFormatVersion: '2010-09-09'

Description: 'S3 bucket for media content with versioning and cross-region replication to us-west-2.'

Resources:
    S3ReplicationRole:
        Type: AWS::IAM::Role
        Properties:
            RoleName: biteroll-s3-replication-role
            AssumeRolePolicyDocument:
                Version: '2012-10-17'
                Statement:
                  - Effect: Allow
                    Principal:
                        Service: s3.amazonaws.com
                    Action: sts:AssumeRole
            Policies:
              - PolicyName: S3ReplicationPolicy
                PolicyDocument:
                    Version: '2012-10-17'
                    Statement:
                      - Effect: Allow
                        Action:
                          - s3:GetReplicationConfiguration
                          - s3:ListBucket
                        Resource: !Sub 'arn:aws:s3:::biteroll-media-sawyer'
                      - Effect: Allow
                        Action:
                          - s3:GetObjectVersionForReplication
                          - s3:GetObjectVersionAcl
                          - s3:GetObjectVersionTagging
                        Resource: !Sub 'arn:aws:s3:::biteroll-media-sawyer/*'
                      - Effect: Allow
                        Action:
                          - s3:ReplicateObject
                          - s3:ReplicateDelete
                          - s3:ReplicateTags
                        Resource: 'arn:aws:s3:::biteroll-media-sawyer-west/*'

    BiteRollMediaBucket:
        Type: 'AWS::S3::Bucket'
        Properties:
            BucketName: 'biteroll-media-sawyer'
            PublicAccessBlockConfiguration:
                BlockPublicAcls: true
                BlockPublicPolicy: true
                IgnorePublicAcls: true
                RestrictPublicBuckets: true
            VersioningConfiguration:
                Status: Enabled
            ReplicationConfiguration:
                Role: !GetAtt S3ReplicationRole.Arn
                Rules:
                  - Id: ReplicateAllToWest
                    Status: Enabled
                    Filter:
                        Prefix: ''
                    Destination:
                        Bucket: 'arn:aws:s3:::biteroll-media-sawyer-west'
                        StorageClass: STANDARD
            Tags:
                - Key: Project
                  Value: BiteRoll

Outputs:
    BiteRollBucketDomainName:
        Description: Outputs domain name
        Value: !GetAtt BiteRollMediaBucket.RegionalDomainName
        Export:
            Name: MediaDomainName
    BiteRollBucketName:
        Description: Outputs the buckets name
        Value: !Ref BiteRollMediaBucket
        Export:
            Name: MediaBucketName