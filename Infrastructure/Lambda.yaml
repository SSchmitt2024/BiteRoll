---
AWSTemplateFormatVersion: '2010-09-09'
Description: 'Lambda to handle all backend business logic'

Parameters:
    DynamoDBTableArn:
        Type: String
        Default: ''
        Description: 'DynamoDB table ARN. Leave empty to use cross-stack import (east only).'
    SecretsArn:
        Type: String
        Default: ''
        Description: 'Secrets Manager ARN. Leave empty to use cross-stack import (east only).'

Conditions:
    UseDynamoImport: !Equals [!Ref DynamoDBTableArn, '']
    UseSecretsImport: !Equals [!Ref SecretsArn, '']

Resources:
    IAMRole:
        Type: 'AWS::IAM::Role'
        Properties:
            AssumeRolePolicyDocument:
                Version: "2012-10-17"
                Statement:
                  - Effect: Allow
                    Principal:
                        Service:
                          - lambda.amazonaws.com
                    Action:
                      - 'sts:AssumeRole'
            Description: "The role of the lambda"
            ManagedPolicyArns:
              - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
            Policies:
              - PolicyName: BiteRollDynamoDBAccess
                PolicyDocument:
                    Version: "2012-10-17"
                    Statement:
                      - Effect: Allow
                        Action:
                          - dynamodb:GetItem
                          - dynamodb:Query
                          - dynamodb:UpdateItem
                          - dynamodb:Scan
                        Resource: !If
                          - UseDynamoImport
                          - !ImportValue DynamoDBARN
                          - !Ref DynamoDBTableArn
                      - Effect: Allow
                        Action:
                          - secretsmanager:GetSecretValue
                        Resource: !If
                          - UseSecretsImport
                          - !ImportValue SecretsARN
                          - !Ref SecretsArn
    LambdaFunction:
        Type: AWS::Lambda::Function
        Properties:
            FunctionName: biteroll-api
            Code:
                S3Bucket: biteroll-static-site-sawyer
                S3Key: lambda/lambda.zip
            Runtime: python3.12
            Handler: lambda.handler
            Role: !GetAtt IAMRole.Arn
            Tags:
              - Key: Project
                Value: BiteRoll
            Timeout: 30

Outputs:
    LambdaFunction:
        Description: "Lambda function ARN"
        Value: !GetAtt LambdaFunction.Arn
        Export:
            Name: LambdaFunctionARN