---
AWSTemplateFormatVersion: '2010-09-09'

Description: 'CloudWatch alarms for BiteRoll operational monitoring'

Parameters:
    LambdaFunctionName:
        Type: String
        Default: biteroll-api
        Description: Lambda function monitored by the alarms
    ApiGatewayName:
        Type: String
        Default: RestAPI
        Description: API Gateway REST API name monitored by the alarms
    ApiGatewayStage:
        Type: String
        Default: prod
        Description: API Gateway stage monitored by the alarms

Resources:
    LambdaErrorAlarm:
        Type: AWS::CloudWatch::Alarm
        Properties:
            AlarmName: BiteRoll-Lambda-Errors
            AlarmDescription: Lambda returned one or more errors in a 5 minute period
            Namespace: AWS/Lambda
            MetricName: Errors
            Dimensions:
                - Name: FunctionName
                  Value: !Ref LambdaFunctionName
            Statistic: Sum
            Period: 300
            EvaluationPeriods: 1
            Threshold: 1
            ComparisonOperator: GreaterThanOrEqualToThreshold
            TreatMissingData: notBreaching
            AlarmActions:
                - !ImportValue BiteRoll-AlarmTopicArn
            OKActions:
                - !ImportValue BiteRoll-AlarmTopicArn

    LambdaThrottleAlarm:
        Type: AWS::CloudWatch::Alarm
        Properties:
            AlarmName: BiteRoll-Lambda-Throttles
            AlarmDescription: Lambda invocations are being throttled
            Namespace: AWS/Lambda
            MetricName: Throttles
            Dimensions:
                - Name: FunctionName
                  Value: !Ref LambdaFunctionName
            Statistic: Sum
            Period: 300
            EvaluationPeriods: 1
            Threshold: 1
            ComparisonOperator: GreaterThanOrEqualToThreshold
            TreatMissingData: notBreaching
            AlarmActions:
                - !ImportValue BiteRoll-AlarmTopicArn
            OKActions:
                - !ImportValue BiteRoll-AlarmTopicArn

    LambdaDurationAlarm:
        Type: AWS::CloudWatch::Alarm
        Properties:
            AlarmName: BiteRoll-Lambda-Duration
            AlarmDescription: Lambda average duration is approaching the configured timeout
            Namespace: AWS/Lambda
            MetricName: Duration
            Dimensions:
                - Name: FunctionName
                  Value: !Ref LambdaFunctionName
            Statistic: Average
            Period: 300
            EvaluationPeriods: 2
            Threshold: 25000
            ComparisonOperator: GreaterThanOrEqualToThreshold
            TreatMissingData: notBreaching
            AlarmActions:
                - !ImportValue BiteRoll-AlarmTopicArn
            OKActions:
                - !ImportValue BiteRoll-AlarmTopicArn

    APIGateway5xxAlarm:
        Type: AWS::CloudWatch::Alarm
        Properties:
            AlarmName: BiteRoll-APIGW-5xx
            AlarmDescription: API Gateway returned one or more server errors in a 5 minute period
            Namespace: AWS/ApiGateway
            MetricName: 5XXError
            Dimensions:
                - Name: ApiName
                  Value: !Ref ApiGatewayName
                - Name: Stage
                  Value: !Ref ApiGatewayStage
            Statistic: Sum
            Period: 300
            EvaluationPeriods: 1
            Threshold: 1
            ComparisonOperator: GreaterThanOrEqualToThreshold
            TreatMissingData: notBreaching
            AlarmActions:
                - !ImportValue BiteRoll-AlarmTopicArn
            OKActions:
                - !ImportValue BiteRoll-AlarmTopicArn

    APIGateway4xxAlarm:
        Type: AWS::CloudWatch::Alarm
        Properties:
            AlarmName: BiteRoll-APIGW-4xx
            AlarmDescription: API Gateway client errors are spiking
            Namespace: AWS/ApiGateway
            MetricName: 4XXError
            Dimensions:
                - Name: ApiName
                  Value: !Ref ApiGatewayName
                - Name: Stage
                  Value: !Ref ApiGatewayStage
            Statistic: Sum
            Period: 300
            EvaluationPeriods: 1
            Threshold: 20
            ComparisonOperator: GreaterThanOrEqualToThreshold
            TreatMissingData: notBreaching
            AlarmActions:
                - !ImportValue BiteRoll-AlarmTopicArn
            OKActions:
                - !ImportValue BiteRoll-AlarmTopicArn

    APIGatewayLatencyAlarm:
        Type: AWS::CloudWatch::Alarm
        Properties:
            AlarmName: BiteRoll-APIGW-Latency
            AlarmDescription: API Gateway average latency is high
            Namespace: AWS/ApiGateway
            MetricName: Latency
            Dimensions:
                - Name: ApiName
                  Value: !Ref ApiGatewayName
                - Name: Stage
                  Value: !Ref ApiGatewayStage
            Statistic: Average
            Period: 300
            EvaluationPeriods: 2
            Threshold: 2000
            ComparisonOperator: GreaterThanOrEqualToThreshold
            TreatMissingData: notBreaching
            AlarmActions:
                - !ImportValue BiteRoll-AlarmTopicArn
            OKActions:
                - !ImportValue BiteRoll-AlarmTopicArn

Outputs:
    LambdaErrorAlarmName:
        Description: Lambda error alarm name
        Value: !Ref LambdaErrorAlarm
    APIGateway5xxAlarmName:
        Description: API Gateway 5XX alarm name
        Value: !Ref APIGateway5xxAlarm
